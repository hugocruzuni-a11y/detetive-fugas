<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pagamento Confirmado | Detetive de Fugas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-emerald-50 h-[100dvh] flex flex-col items-center justify-center text-center p-6">
    <div class="bg-white p-8 sm:p-14 rounded-[2.5rem] shadow-2xl max-w-md w-full border border-emerald-100 relative overflow-hidden">
        <div class="absolute inset-x-0 top-0 h-2 bg-emerald-500"></div>
        <div class="w-20 h-20 sm:w-24 sm:h-24 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 sm:mb-8 shadow-xl shadow-emerald-500/40">
            <svg class="w-10 h-10 sm:w-12 sm:h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h1 class="text-2xl sm:text-3xl font-black text-slate-900 mb-3 tracking-tight">Acesso Desbloqueado!</h1>
        <p class="text-slate-500 mb-8 sm:mb-10 font-medium leading-relaxed text-sm sm:text-base">O teu pagamento foi processado. Verifica a tua caixa de e-mail (e a pasta de SPAM) nas próximas horas para acederes ao relatório e às minutas.</p>
        <a href="/" class="inline-block w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 sm:py-4 rounded-xl transition-colors text-sm sm:text-base">Voltar ao início</a>
    </div>
</body>
