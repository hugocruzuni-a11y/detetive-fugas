<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acesso Concedido | Detetive de Fugas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; }</style>
</head>
<body class="min-h-[100dvh] flex flex-col items-center justify-center text-center p-6 relative overflow-hidden">
    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-lg h-[60vh] bg-emerald-500/20 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="bg-slate-900/80 backdrop-blur-2xl p-10 sm:p-14 rounded-[3rem] shadow-[0_0_50px_rgba(16,185,129,0.1)] border border-slate-700 max-w-lg w-full relative z-10">
        <div class="w-24 h-24 sm:w-28 sm:h-28 bg-gradient-to-tr from-emerald-400 to-teal-500 rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-[0_15px_30px_rgba(16,185,129,0.3)] animate-bounce">
            <svg class="w-12 h-12 sm:w-14 sm:h-14 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>
        
        <div class="inline-block bg-emerald-500/10 text-emerald-400 px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest mb-4 border border-emerald-500/20">
            Faturação Confirmada
        </div>

        <h1 class="text-3xl sm:text-4xl font-black text-white mb-4 tracking-tight">O Cofre Está Aberto.</h1>
        <p class="text-slate-400 mb-10 font-medium leading-relaxed text-sm sm:text-base">
            Enviámos neste exato segundo um e-mail com o <strong class="text-white">relatório forense detalhado</strong> e as <strong class="text-white">minutas legais de cancelamento</strong> prontas a colar.<br><br>
            <span class="text-xs text-slate-500">(Verifica a pasta de SPAM se não vires o e-mail em 2 minutos).</span>
        </p>
        
        <a href="/" class="inline-flex items-center justify-center gap-2 w-full bg-white text-slate-900 hover:bg-emerald-50 font-black py-4 rounded-[1.5rem] transition-all text-base hover:scale-105">
            Nova Auditoria
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </a>
    </div>
</body>
</html>
